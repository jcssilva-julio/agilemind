<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgileMind · Administração</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#08090d;--bg-card:#101320;--bg-elevated:#141826;
  --border:rgba(255,255,255,.10);--text:#dde3f0;--muted:#7a87a0;--dim:#404c64;
  --accent:#00c896;--accent-glow:rgba(0,200,150,.20);--red:#ff5c5c;--orange:#ff7a45;
}
html,body{min-height:100%}
body{
  font-family:'DM Sans',system-ui,sans-serif;background:var(--bg-base);color:var(--text);
  display:flex;flex-direction:column;align-items:center;padding:48px 16px;min-height:100vh;
  background-image:linear-gradient(rgba(0,200,150,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:8px}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,#00c896,#3d8eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand p{font-size:12px;color:var(--muted)}
.master{
  width:420px;max-width:92vw;margin:18px 0;background:rgba(255,122,69,.06);
  border:1px solid rgba(255,122,69,.25);border-radius:12px;padding:14px 16px;
}
.master label{font-size:11px;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.card{
  width:420px;max-width:92vw;background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;padding:22px 22px;margin-top:16px;
}
.card h2{font-size:15px;font-weight:600;margin-bottom:4px}
.card .sub{font-size:12px;color:var(--muted);margin-bottom:14px}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
input{
  width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;
}
input:focus{border-color:var(--accent)}
button{
  width:100%;margin-top:18px;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;
}
button:hover{opacity:.9}button:active{transform:scale(.98)}button:disabled{opacity:.5;cursor:not-allowed}
.btn-create{background:var(--accent);color:#050f0a}
.btn-deactivate{background:transparent;border:1px solid rgba(255,92,92,.4);color:var(--red)}
.msg{display:none;margin-top:14px;font-size:12.5px;border-radius:8px;padding:9px 11px;text-align:center}
.msg.ok{display:block;background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.3);color:var(--accent)}
.msg.err{display:block;background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.3);color:var(--red)}
.foot{margin-top:22px;font-size:11px;color:var(--dim)}
.foot a{color:var(--muted);text-decoration:underline}
</style>
</head>
<body>
  <div class="brand">
    <h1>AgileMind · Administração</h1>
    <p>Gestão de usuários · requer senha master</p>
  </div>

  <div class="master">
    <label for="master">Senha master</label>
    <input id="master" type="password" placeholder="••••••••" autocomplete="off"/>
  </div>

  <!-- Criar usuário -->
  <div class="card">
    <h2>Criar usuário</h2>
    <div class="sub">O novo usuário poderá fazer login com e-mail e senha.</div>
    <label for="c_email">E-mail</label>
    <input id="c_email" type="email" placeholder="pessoa@empresa.com"/>
    <label for="c_nome">Nome</label>
    <input id="c_nome" type="text" placeholder="Nome da pessoa"/>
    <label for="c_pass">Senha (mín. 6 caracteres)</label>
    <input id="c_pass" type="text" placeholder="senha123"/>
    <button class="btn-create" id="btnCreate">Criar usuário</button>
    <div class="msg" id="createMsg"></div>
  </div>

  <!-- Desativar usuário -->
  <div class="card">
    <h2>Desativar usuário</h2>
    <div class="sub">Impede o login. Não apaga dados.</div>
    <label for="d_email">E-mail</label>
    <input id="d_email" type="email" placeholder="pessoa@empresa.com"/>
    <button class="btn-deactivate" id="btnDeactivate">Desativar acesso</button>
    <div class="msg" id="deactivateMsg"></div>
  </div>

  <div class="foot"><a href="/login">← voltar para o login</a></div>

<script>
const master = document.getElementById('master');

async function call(url, body, btn, msgEl, okText) {
  if (!master.value) { show(msgEl, 'err', 'Informe a senha master.'); return; }
  btn.disabled = true;
  const original = btn.textContent; btn.textContent = 'Processando...';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ master_password: master.value, ...body }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok) show(msgEl, 'ok', okText);
    else show(msgEl, 'err', data.error || 'Erro (HTTP ' + res.status + ')');
  } catch {
    show(msgEl, 'err', 'Falha de conexão.');
  }
  btn.disabled = false; btn.textContent = original;
}
function show(el, kind, text){ el.className = 'msg ' + kind; el.textContent = text; }

document.getElementById('btnCreate').addEventListener('click', () => {
  call('/admin/create-user', {
    email: document.getElementById('c_email').value.trim(),
    nome: document.getElementById('c_nome').value.trim(),
    password: document.getElementById('c_pass').value,
  }, document.getElementById('btnCreate'), document.getElementById('createMsg'),
  '✓ Usuário criado. Já pode fazer login.');
});

document.getElementById('btnDeactivate').addEventListener('click', () => {
  call('/admin/deactivate-user', {
    email: document.getElementById('d_email').value.trim(),
  }, document.getElementById('btnDeactivate'), document.getElementById('deactivateMsg'),
  '✓ Acesso desativado.');
});
</script>
</body>
</html>
